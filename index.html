<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS7 Tournament Console</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d0d0d; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 80px; }
        .header { background: #141414; border-bottom: 2px solid #ff4d4d; padding: 20px; text-align: center; }
        .header h1 { color: #ffb703; font-size: 22px; letter-spacing: 1px; text-transform: uppercase; }
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        .card { background: #141414; border: 1px solid #262626; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card-title { color: #ffb703; font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        label { display: block; color: #aaaaaa; font-size: 13px; margin-bottom: 5px; margin-top: 15px; }
        select, input[type="text"], input[type="file"], input[type="datetime-local"] { width: 100%; background: #222222; border: 1px solid #333333; color: white; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 5px; }
        select:focus, input[type="text"]:focus, input[type="datetime-local"]:focus { border-color: #ffb703; }
        .btn-submit { background: linear-gradient(135deg, #d9381e, #ffb703); color: white; border: none; width: 100%; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-submit:active { transform: scale(0.98); }
        .app-section { display: none; }
        .app-section.active { display: block; }
        .feed-post { background: #1a1a1a; border-left: 4px solid #ffb703; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .post-header { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 8px; border-bottom: 1px solid #2a2a2a; padding-bottom: 5px; }
        .post-content { font-size: 14px; color: #ddd; line-height: 1.4; }
        .post-image-container { margin-top: 10px; border-radius: 6px; overflow: hidden; max-height: 200px; background: #000; }
        .post-image-container img { width: 100%; height: auto; display: block; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #141414; border-top: 2px solid #262626; display: flex; height: 65px; z-index: 1000; }
        .nav-btn { flex: 1; background: none; border: none; color: #888888; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; gap: 4px; text-transform: uppercase; }
        .nav-btn i { font-size: 18px; }
        .nav-btn.active { color: #ffb703; background: linear-gradient(to top, rgba(255,183,3,0.05), transparent); }
    </style>
</head>
<body>

    <div class="header">
        <h1>RS7 Tournament Console</h1>
    </div>

    <div class="container">
        <!-- 🏠 HOME TAB: USER SUBMISSIONS -->
        <div id="sec-home" class="app-section active">
            <div class="card">
                <div class="card-title">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Upload Match Details
                </div>
                
                <label>Select Available Match</label>
                <select id="matchSelect">
                    <option value="">-- Choose Live Match --</option>
                </select>

                <label>Website / App UID</label>
                <input type="text" id="userUid" placeholder="Enter your unique UID">

                <label>Kill Screenshot</label>
                <input type="file" id="killScreenshot" accept="image/*">

                <label>Booyah / Victory Screenshot (Optional)</label>
                <input type="file" id="booyahScreenshot" accept="image/*">

                <button class="btn-submit" onclick="handleMatchUpload()">Submit Match Proof</button>
            </div>
        </div>

        <!-- ✍️ POST TAB: OPINIONS -->
        <div id="sec-post" class="app-section">
            <div class="card">
                <div class="card-title">
                    <i class="fa-solid fa-pen-to-square"></i> Share Your Opinion
                </div>
                
                <label>Your Message / Feedback</label>
                <input type="text" id="opinionMessage" placeholder="Write your thoughts about the match...">

                <label>Attach Screenshot (Optional)</label>
                <input type="file" id="opinionFile" accept="image/*">

                <button class="btn-submit" onclick="handleOpinionSubmit()">Post to Community</button>
            </div>
        </div>

        <!-- 📊 FEED TAB: LIVE UPDATES -->
        <div id="sec-feed" class="app-section">
            <h3 style="color:#ff4d4d; margin-bottom:15px; font-size:14px; text-transform:uppercase; letter-spacing:1px;">Live Community Feed</h3>
            <div id="feed-container">
                <!-- Posts dynamic yahan aayenge -->
            </div>
        </div>

        <!-- ⚙️ ADMIN PANEL TAB (Hidden by default) -->
        <div id="sec-admin" class="app-section">
            <div class="card" style="border-color: #ff4d4d;">
                <div class="card-title" style="color: #ff4d4d;">
                    <i class="fa-solid fa-user-shield"></i> Admin Control Panel
                </div>
                
                <form id="add-match-form">
                    <label>Match Name / Title</label>
                    <input type="text" id="adminMatchName" placeholder="e.g., Free Fire Daily Scrims" required>

                    <label>Date & Time</label>
                    <input type="datetime-local" id="adminMatchTime" required>

                    <label>Unique Match ID</label>
                    <input type="text" id="adminMatchId" placeholder="e.g., FF-MATCH-101" required>

                    <button type="submit" class="btn-submit" style="background: linear-gradient(135deg, #ff4d4d, #ffb703);">Upload & Live Match</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Buttons -->
    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('sec-home', this)">
            <i class="fa-solid fa-house"></i>Home
        </button>
        <button class="nav-btn" onclick="switchTab('sec-post', this)">
            <i class="fa-solid fa-pen-to-square"></i>Post
        </button>
        <button class="nav-btn" onclick="switchTab('sec-feed', this)">
            <i class="fa-solid fa-rss"></i>Feed
        </button>
    </div>

    <!-- Firebase V8 Core & Realtime Database Script -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 💬 MAIN FIREBASE CONFIG (RS7 Community Project)
        const firebaseConfig = {
            apiKey: "AIzaSyDqOAV7hfa6oVxz908GNWMvc0cq5n6cIDc",
            authDomain: "rs7-community.firebaseapp.com",
            projectId: "rs7-community",
            databaseURL: "https://rs7-community-default-rtdb.firebaseio.com/", // Updated to RS7 RTDB URL
            messagingSenderId: "844493221308",
            appId: "1:844493221308:web:20982c26bac640da2f0fb9"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database(); 
                         
        const IMGBB_API_KEY = '0de43554e74e8bef68fc0f49cccf0d1f';

        // Tab Switch Navigation
        function switchTab(sectionId, element) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            if(element) element.classList.add('active');
        }

        // ⚙️ ADMIN: UPLOAD MATCH
        document.getElementById('add-match-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const matchName = document.getElementById('adminMatchName').value;
            const matchTime = document.getElementById('adminMatchTime').value;
            const matchId = document.getElementById('adminMatchId').value;

            rtdb.ref('matches').push({
                name: matchName,
                time: matchTime,
                matchId: matchId,
                status: "live",
                timestamp: firebase.database.ServerValue.TIMESTAMP
            })
            .then(() => {
                alert("🔥 Match uploaded successfully to RS7 Community!");
                document.getElementById('add-match-form').reset();
                switchTab('sec-home', document.querySelectorAll('.nav-btn')[0]);
            })
            .catch((error) => {
                alert("Database Error: " + error.message);
            });
        });

        // 🔄 USER: FETCH LIVE MATCHES FOR DROPDOWN
        function fetchLiveMatches() {
            const matchSelect = document.getElementById('matchSelect');
            
            rtdb.ref('matches').on('value', (snapshot) => {
                matchSelect.innerHTML = '<option value="">-- Choose Live Match --</option>';
                
                if (!snapshot.exists()) {
                    matchSelect.innerHTML += '<option value="">No Live Match Available</option>';
                    return;
                }

                let hasLiveMatch = false;
                snapshot.forEach((childSnapshot) => {
                    const matchData = childSnapshot.val();
                    
                    if (matchData && matchData.status && matchData.status.toString().trim().toLowerCase() === 'live') {
                        hasLiveMatch = true;
                        
                        let displayDate = "";
                        if(matchData.time) {
                            displayDate = " | " + new Date(matchData.time).toLocaleString('en-IN', {dateStyle: 'medium', timeStyle: 'short'});
                        }

                        matchSelect.innerHTML += `
                            <option value="${childSnapshot.key}">${matchData.name || 'Unnamed Match'}${displayDate}</option>
                        `;
                    }
                });

                if (!hasLiveMatch) {
                    matchSelect.innerHTML += '<option value="">No Live Match Available</option>';
                }
            });
        }

        // 📤 IMGBB IMAGE UPLOAD
        async function uploadToImgBB(file) {
            if (!file) return null;
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                const data = await response.json();
                return data.success ? data.data.url : null;
            } catch (error) {
                console.error("ImgBB Error:", error);
                return null;
            }
        }

        // 🎮 USER: SUBMIT MATCH PROOF
        async function handleMatchUpload() {
            const matchId = document.getElementById('matchSelect').value;
            const matchSelectEl = document.getElementById('matchSelect');
            const matchText = matchSelectEl.options[matchSelectEl.selectedIndex]?.text || '';
            const uid = document.getElementById('userUid').value;
            const killFile = document.getElementById('killScreenshot').files[0];
            const booyahFile = document.getElementById('booyahScreenshot').files[0];

            if (!matchId || !uid || !killFile) {
                alert("⚠️ Match Select karein, UID daalein aur Kill Screenshot lagayein!");
                return;
            }

            alert("🔄 Uploading proof... Please wait.");
            const killUrl = await uploadToImgBB(killFile);
            const booyahUrl = booyahFile ? await uploadToImgBB(booyahFile) : null;

            if (!killUrl) {
                alert("❌ Image upload failed!");
                return;
            }

            rtdb.ref('submissions').push({
                matchId, matchName: matchText, uid, killScreenshot: killUrl, booyahScreenshot: booyahUrl, status: 'pending', timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                alert("✅ Match details successfully uploaded!");
                document.getElementById('userUid').value = '';
                document.getElementById('killScreenshot').value = '';
                document.getElementById('booyahScreenshot').value = '';
                switchTab('sec-feed', document.querySelectorAll('.nav-btn')[2]);
            }).catch(err => alert("Error: " + err.message));
        }

        // 💬 USER: SUBMIT OPINION
        async function handleOpinionSubmit() {
            const msg = document.getElementById('opinionMessage').value;
            const file = document.getElementById('opinionFile').files[0];

            if (!msg.trim()) {
                alert("⚠️ Kuch type toh kijiye!");
                return;
            }

            alert("🔄 Posting...");
            const imgUrl = file ? await uploadToImgBB(file) : null;

            rtdb.ref('opinions').push({
                message: msg, screenshot: imgUrl, timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                alert("✅ Posted successfully!");
                document.getElementById('opinionMessage').value = '';
                document.getElementById('opinionFile').value = '';
                switchTab('sec-feed', document.querySelectorAll('.nav-btn')[2]);
            }).catch(err => alert("Error: " + err.message));
        }

        // 📺 REALTIME FEED UPDATES
        function listenToFeed() {
            rtdb.ref('submissions').limitToLast(10).on('value', () => renderFeed());
            rtdb.ref('opinions').limitToLast(10).on('value', () => renderFeed());
        }

        async function renderFeed() {
            const feedContainer = document.getElementById('feed-container');
            let list = [];
            
            try {
                const subSnapshot = await rtdb.ref('submissions').limitToLast(10).once('value');
                subSnapshot.forEach(child => { list.push({ ...child.val(), type: 'sub' }); });

                const opSnapshot = await rtdb.ref('opinions').limitToLast(10).once('value');
                opSnapshot.forEach(child => { list.push({ ...child.val(), type: 'op' }); });

                list.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                feedContainer.innerHTML = list.length === 0 ? '<div style="text-align:center;color:#666;padding:20px;">No posts yet!</div>' : '';

                list.forEach(item => {
                    if(item.type === 'op') {
                        feedContainer.innerHTML += `
                            <div class="feed-post">
                                <div class="post-header"><span><i class="fa-solid fa-comment"></i> Opinion</span></div>
                                <div class="post-content">${item.message}</div>
                                ${item.screenshot ? `<div class="post-image-container"><img src="${item.screenshot}"></div>` : ''}
                            </div>`;
                    } else {
                        feedContainer.innerHTML += `
                            <div class="feed-post">
                                <div class="post-header"><span><i class="fa-solid fa-gamepad"></i> Match Proof</span><span>UID: ${item.uid}</span></div>
                                <div class="post-content">Submitted for <strong>${item.matchName}</strong><br>Status: ${item.status}</div>
                                <div class="post-image-container"><img src="${item.killScreenshot}"></div>
                            </div>`;
                    }
                });
            } catch(e) { console.error(e); }
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchLiveMatches();
            listenToFeed();
        });
    </script>
</body>
</html>
