<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RS7 Console</title>
    <style>
        body { background: #0b0b0b; color: white; padding: 20px; font-family: sans-serif; }
        .card { background: #161616; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        select, input, button { width: 100%; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Live Matches</h2>
        <select id="matchSelect">
            <option value="">Loading...</option>
        </select>
        <input type="text" id="userUid" placeholder="Enter UID">
        <button id="submitBtn" onclick="testFunction()">Submit Test</button>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Configuration
        const esportConfig = {
            apiKey: "AIzaSyBiZkM5dnAX5ItZybHk_43j5yQGYgui-Jo",
            databaseURL: "https://ff-tornament-app-9e3ae-default-rtdb.firebaseio.com/",
            projectId: "ff-tornament-app-9e3ae"
        };

        // Init
        try {
            if (!firebase.apps.length) {
                const esportApp = firebase.initializeApp(esportConfig, "esportApp");
                const db = esportApp.database();
                
                // Fetch Data
                db.ref('matches').on('value', (snapshot) => {
                    const select = document.getElementById('matchSelect');
                    select.innerHTML = '<option value="">-- Select Match --</option>';
                    
                    if (snapshot.exists()) {
                        snapshot.forEach((child) => {
                            let m = child.val();
                            if (m.status === 'live') {
                                select.innerHTML += `<option value="${child.key}">${m.name}</option>`;
                            }
                        });
                    } else {
                        select.innerHTML = '<option value="">No Matches Found</option>';
                    }
                });
            }
        } catch (e) {
            console.error("Initialization Error: ", e);
        }

        function testFunction() { alert("Button kaam kar raha hai!"); }
    </script>
</body>
</html>
