<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS7 Community & Results Hub</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            padding-bottom: 90px; /* Space for bottom nav */
        }

        /* 👑 HEADER STYLING */
        header {
            background: linear-gradient(135deg, #111, #161616);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ff4e50;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        header h1 {
            font-size: 20px;
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 💰 ADVERTISEMENT SLOTS STYLING */
        .ad-container {
            background: #151515;
            border: 1px dashed #333;
            margin: 15px auto;
            padding: 10px;
            text-align: center;
            max-width: 728px;
            border-radius: 8px;
        }

        .ad-label {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
            letter-spacing: 1px;
        }

        .ad-placeholder {
            color: #444;
            font-size: 13px;
            font-weight: bold;
            padding: 20px 0;
        }

        /* 📱 MAIN CONTENT & FORMS */
        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .app-section {
            display: none; /* Hidden by default, controlled via JS */
            animation: fadeIn 0.3s ease-in-out;
        }

        .app-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: #161616;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #f9d423;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* FORMS & INPUTS */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: #ff4e50;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        /* BUTTONS */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(255,78,80,0.3);
            transition: transform 0.2s;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* FEED / POSTS STYLING */
        .feed-post {
            background: #161616;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #ff9f43;
            margin-bottom: 10px;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
        }

        .post-uid {
            font-weight: bold;
            color: #00d2d3;
        }

        .post-content {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .post-image-container {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #222;
            border: 1px solid #333;
            margin-top: 8px;
        }

        .post-image-container img {
            width: 100%;
            display: block;
            height: auto;
            max-height: 300px;
            object-fit: contain;
        }

        /* 📱 FIXED BOTTOM NAVIGATION BAR */
        #fixed-bottom-nav-bar {
            display: flex !important;
            justify-content: space-around !important;
            align-items: center !important;
            background: #111111 !important;
            padding: 8px 1px !important;
            border-top: 2px solid #ff4e50 !important;
            width: 100% !important;
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            z-index: 999999 !important;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.7) !important;
        }

        .nav-btn {
            flex: 1 !important;
            margin: 0 2px !important;
            padding: 9px 1px !important;
            background: #1c1c1c !important;
            color: #aaaaaa !important;
            border: 1px solid #2d2d2d !important;
            border-radius: 6px !important;
            font-weight: bold !important;
            font-size: 10px !important;
            cursor: pointer !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            gap: 4px !important;
            text-transform: uppercase !important;
            transition: all 0.2s;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #ff4e50, #f9d423) !important;
            color: #ffffff !important;
            border: none !important;
            box-shadow: 0 2px 10px rgba(255,78,80,0.4) !important;
        }
    </style>
</head>
<body>

    <!-- 👑 HEADER -->
    <header>
        <h1>RS7 Tournament Console</h1>
    </header>

    <!-- 💰 TOP BANNER AD SLOT -->
    <div class="ad-container">
        <span class="ad-label">Advertisement</span>
        <div class="ad-placeholder">
            <i class="fa-solid fa-rectangle-ad"></i> Responsive Top Banner Ad Slot
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- ==========================================
             1️⃣ TAB: HOME (DETAILS UPLOAD FORM)
             ========================================== -->
        <div id="sec-upload" class="app-section active">
            <div class="card">
                <h2><i class="fa-solid fa-cloud-arrow-up"></i> Upload Match Details</h2>
                
                <div class="form-group">
                    <label>Select Available Match</label>
                    <select id="matchSelect" class="form-control">
                        <option value="">-- Choose Live Match --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Website / App UID</label>
                    <input type="text" id="userUid" class="form-control" placeholder="Enter your unique UID">
                </div>

                <div class="form-group">
                    <label>Kill Screenshot</label>
                    <input type="file" id="killScreenshot" class="form-control" accept="image/*">
                </div>

                <div class="form-group">
                    <label>Booyah / Victory Screenshot (Optional)</label>
                    <input type="file" id="booyahScreenshot" class="form-control" accept="image/*">
                </div>

                <button class="btn-submit" onclick="handleMatchUpload()">Submit Match Proof</button>
            </div>
        </div>

        <!-- ==========================================
             2️⃣ TAB: POST (ADD OPINION SCREENSHOT)
             ========================================== -->
        <div id="sec-opinion" class="app-section">
            <div class="card">
                <h2><i class="fa-solid fa-comment-medical"></i> Share Your Opinion</h2>
                
                <div class="form-group">
                    <label>Your Message / Feedback</label>
                    <textarea id="opinionMessage" class="form-control" placeholder="Write your thoughts about the match, hacker reports, or suggestions..."></textarea>
                </div>

                <div class="form-group">
                    <label>Attach Screenshot (Optional)</label>
                    <input type="file" id="opinionFile" class="form-control" accept="image/*">
                </div>

                <button class="btn-submit" onclick="handleOpinionSubmit()">Post to Community</button>
            </div>
        </div>

        <!-- ==========================================
             3️⃣ TAB: RESULTS (LIVE FEED WALL)
             ========================================== -->
        <div id="sec-results" class="app-section">
            <h2 style="font-size: 18px; margin-bottom: 15px; color: #ff4e50; text-transform: uppercase;">
                <i class="fa-solid fa-rss"></i> Live Community Feed
            </h2>
            
            <div id="feed-container">
                <!-- Live data Firebase se automatic yahan render hoga -->
            </div>
        </div>

    </div>

    <!-- 📱 FIXED BOTTOM NAVIGATION BAR -->
    <div id="fixed-bottom-nav-bar">
        <button class="nav-btn active" onclick="switchTab('sec-upload', this)">
            <i class="fa-solid fa-house"></i> Home
        </button>
        <button class="nav-btn" onclick="switchTab('sec-opinion', this)">
            <i class="fa-solid fa-pen-to-square"></i> Post
        </button>
        <button class="nav-btn" onclick="switchTab('sec-results', this)">
            <i class="fa-solid fa-square-poll-vertical"></i> Feed
        </button>
    </div>


    <!-- 📦 Firebase SDKs (Web v8 compatible libraries) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // 🎮 1. PROJECT-1 CONFIG: ff-tornament-app-9e3ae (Matches Fetch karne ke liye)
        const esportConfig = {
            apiKey: "AIzaSyBiZkM5dnAX5ItZybHk_43j5yQGYgui-Jo",
            authDomain: "ff-tornament-app-9e3ae.firebaseapp.com",
            projectId: "ff-tornament-app-9e3ae",
            databaseURL: "https://ff-tornament-app-9e3ae-default-rtdb.firebaseio.com/", 
            messagingSenderId: "595326120234",
            appId: "1:595326120234:web:fc6f0e3f02977cadc16e53"
        };

        // 💬 2. PROJECT-2 CONFIG: rs7-community (Submissions aur Opinions save karne ke liye)
        const communityConfig = {
            apiKey: "AIzaSyDqOAV7hfa6oVxz908GNWMvc0cq5n6cIDc",
            authDomain: "rs7-community.firebaseapp.com",
            projectId: "rs7-community",
            storageBucket: "rs7-community.firebasestorage.app",
            messagingSenderId: "844493221308",
            appId: "1:844493221308:web:20982c26bac640da2f0fb9"
        };

        // 🔥 Dual App Initialization (Alag-alag naam dekar init kiya)
        const esportApp = firebase.initializeApp(esportConfig, "esportApp");
        const communityApp = firebase.initializeApp(communityConfig, "communityApp");

        // 📂 Alag-alag Database Instance references
        const dbEsport = firebase.firestore(esportApp);      // Matches data source
        const dbCommunity = firebase.firestore(communityApp); // Community user posts target

        // 🔑 ImgBB API Key
        const IMGBB_API_KEY = '0de43554e74e8bef68fc0f49cccf0d1f';

        // ========================================================
        // 📱 TAB SWITCHING NAVIGATION LOGIC
        // ========================================================
        function switchTab(sectionId, element) {
            document.querySelectorAll('.app-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');
            element.classList.add('active');
        }

        // ========================================================
        // 🔄 1️⃣ FETCH MATCHES FROM ESPORT APP (PROJECT 1)
        // ========================================================
        function fetchLiveMatches() {
            const matchSelect = document.getElementById('matchSelect');
            
            // dbEsport se live matches check honge
            dbEsport.collection('matches').where("status", "==", "live").onSnapshot((querySnapshot) => {
                matchSelect.innerHTML = '<option value="">-- Choose Live Match --</option>';
                
                if(querySnapshot.empty) {
                    matchSelect.innerHTML += '<option value="">No Live Match Available</option>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const matchData = doc.data();
                    matchSelect.innerHTML += `
                        <option value="${doc.id}">${matchData.name} (Prize: ₹${matchData.prize || 0})</option>
                    `;
                });
            }, (error) => {
                console.error("Esport App se matches load karne mein error: ", error);
            });
        }

        // ========================================================
        // 📺 2️⃣ REAL-TIME COMMUNITY FEED FROM COMMUNITY APP (PROJECT 2)
        // ========================================================
        function listenToCommunityFeed() {
            // Live data refresh triggers for real-time syncing
            dbCommunity.collection('opinions').orderBy('timestamp', 'desc').limit(10).onSnapshot(() => { renderFeed(); });
            dbCommunity.collection('submissions').orderBy('timestamp', 'desc').limit(10).onSnapshot(() => { renderFeed(); });
        }

        async function renderFeed() {
            const feedContainer = document.getElementById('feed-container');
            let combinedFeed = [];

            try {
                const opinionsSnap = await dbCommunity.collection('opinions').orderBy('timestamp', 'desc').limit(10).get();
                opinionsSnap.forEach(doc => {
                    combinedFeed.push({ id: doc.id, ...doc.data(), feedType: 'opinion' });
                });

                const submissionsSnap = await dbCommunity.collection('submissions').orderBy('timestamp', 'desc').limit(10).get();
                submissionsSnap.forEach(doc => {
                    combinedFeed.push({ id: doc.id, ...doc.data(), feedType: 'submission' });
                });

                // Timestamp ke mutabik desc order sort
                combinedFeed.sort((a, b) => {
                    const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
                    const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
                    return timeB - timeA;
                });

                feedContainer.innerHTML = '';

                if(combinedFeed.length === 0) {
                    feedContainer.innerHTML = '<div style="text-align:center; color:#666; padding:20px;">No posts yet!</div>';
                    return;
                }

                combinedFeed.forEach((item, index) => {
                    let postHtml = '';
                    
                    if(item.feedType === 'opinion') {
                        postHtml = `
                            <div class="feed-post">
                                <div class="post-header">
                                    <span><i class="fa-solid fa-comment"></i> User Opinion</span>
                                    <span class="post-uid">Community Post</span>
                                </div>
                                <div class="post-content">${item.message}</div>
                                ${item.screenshot ? `<div class="post-image-container"><img src="${item.screenshot}" alt="Opinion Image"></div>` : ''}
                            </div>
                        `;
                    } else {
                        postHtml = `
                            <div class="feed-post">
                                <div class="post-header">
                                    <span><i class="fa-solid fa-gamepad"></i> Match Proof</span>
                                    <span class="post-uid">UID: ${item.uid}</span>
                                </div>
                                <div class="post-content">
                                    Submitted proof for <strong>${item.matchName || 'Match'}</strong>. <br>
                                    Status: <span style="color:${item.status === 'pending' ? '#ff9f43' : '#28a745'}; font-weight:bold; text-transform:uppercase;">${item.status}</span>
                                </div>
                                <div class="post-image-container">
                                    <img src="${item.killScreenshot}" alt="Kill Screenshot">
                                </div>
                            </div>
                        `;
                    }

                    feedContainer.innerHTML += postHtml;

                    // 💰 AD UNIT INSIDE FEED FOR REVENUE
                    if (index === 1) {
                        feedContainer.innerHTML += `
                            <div class="ad-container" style="margin: 20px 0;">
                                <span class="ad-label">Sponsored Ad</span>
                                <div class="ad-placeholder" style="padding: 10px 0;">
                                    <i class="fa-solid fa-rectangle-ad"></i> In-Feed Native Ad Unit (High Earnings)
                                </div>
                            </div>
                        `;
                    }
                });

            } catch (err) {
                console.error("Feed updates pull error:", err);
            }
        }

        // ========================================================
        // 📤 3️⃣ IMGBB IMAGE UPLOAD FUNCTION
        // ========================================================
        async function uploadToImgBB(file) {
            if (!file) return null;
            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                return data.success ? data.data.url : null;
            } catch (error) {
                console.error("ImgBB upload failed:", error);
                return null;
            }
        }

        // ========================================================
        // 🎮 4️⃣ SUBMIT MATCH PROOF TO COMMUNITY APP (PROJECT 2)
        // ========================================================
        async function handleMatchUpload() {
            const matchId = document.getElementById('matchSelect').value;
            const matchSelectEl = document.getElementById('matchSelect');
            const matchText = matchSelectEl.selectedIndex >= 0 ? matchSelectEl.options[matchSelectEl.selectedIndex].text : '';
            const uid = document.getElementById('userUid').value;
            const killFile = document.getElementById('killScreenshot').files[0];
            const booyahFile = document.getElementById('booyahScreenshot').files[0];

            if (!matchId || !uid || !killFile) {
                alert("⚠️ Match Select karein, UID daalein aur Kill Screenshot attach karein!");
                return;
            }

            alert("🔄 Processing data... Please wait.");

            const killImageUrl = await uploadToImgBB(killFile);
            const booyahImageUrl = booyahFile ? await uploadToImgBB(booyahFile) : null;

            if (!killImageUrl) {
                alert("❌ Image upload failed. Retrying suggested.");
                return;
            }

            // Data dbCommunity (Project 2) mein save hoga
            dbCommunity.collection('submissions').add({
                matchId: matchId,
                matchName: matchText,
                uid: uid,
                killScreenshot: killImageUrl,
                booyahScreenshot: booyahImageUrl,
                status: 'pending',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert("✅ Match details community project par upload ho gayi!");
                document.getElementById('userUid').value = '';
                document.getElementById('killScreenshot').value = '';
                document.getElementById('booyahScreenshot').value = '';
                document.getElementById('matchSelect').value = '';
                switchTab('sec-results', document.querySelectorAll('.nav-btn')[2]);
            })
            .catch((error) => {
                console.error("Firestore Upload Error: ", error);
                alert("❌ Submissions track error. Rules verify karein.");
            });
        }

        // ========================================================
        // 💬 5️⃣ SUBMIT OPINION TO COMMUNITY APP (PROJECT 2)
        // ========================================================
        async function handleOpinionSubmit() {
            const msg = document.getElementById('opinionMessage').value;
            const opinionFile = document.getElementById('opinionFile').files[0];

            if (!msg.trim()) {
                alert("⚠️ Opinion blank nahi choda ja sakta!");
                return;
            }

            alert("🔄 Posting opinion...");

            const opinionImageUrl = opinionFile ? await uploadToImgBB(opinionFile) : null;

            // Opinion dbCommunity (Project 2) mein save hoga
            dbCommunity.collection('opinions').add({
                message: msg,
                screenshot: opinionImageUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert("✅ Opinion successfully feed wall par save ho gaya!");
                document.getElementById('opinionMessage').value = '';
                document.getElementById('opinionFile').value = '';
                switchTab('sec-results', document.querySelectorAll('.nav-btn')[2]);
            })
            .catch((error) => {
                console.error("Opinion submit error: ", error);
            });
        }

        // App Initialization
        window.addEventListener('DOMContentLoaded', () => {
            fetchLiveMatches();
            listenToCommunityFeed();
        });
    </script>
</body>
</html>
