<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RS7 Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { color: #ff4e50; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #161616; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; font-size: 14px; }
        th { background: #222; color: #f9d423; }
        
        .btn-action { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-approve { background: #28a745; color: white; margin-right: 5px; }
        .btn-reject { background: #dc3545; color: white; }
        .status-pill { padding: 4px 8px; border-radius: 10px; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1><i class="fa-solid fa-user-shield"></i> Admin Control Panel</h1>

    <table>
        <thead>
            <tr>
                <th>UID</th>
                <th>Screenshot</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="admin-table-body">
            <!-- Data yahan Firebase se aayega -->
        </tbody>
    </table>

    <script>
        // Firebase Firestore se data real-time fetch karne ka logic
        function loadSubmissions() {
            // Yahan aapke Firestore 'submissions' collection ka ref aayega
            // Example: db.collection('submissions').onSnapshot(...)
            const tableBody = document.getElementById('admin-table-body');
            
            // Dummy logic (Jab Firebase setup ho jaye, to ise replace kar dena)
            tableBody.innerHTML = `
                <tr>
                    <td>UID-998877</td>
                    <td><a href="#" style="color:#00d2d3;">View Image</a></td>
                    <td><span class="status-pill" style="background:#444;">Pending</span></td>
                    <td>
                        <button class="btn-action btn-approve" onclick="updateStatus('approve')">Approve</button>
                        <button class="btn-action btn-reject" onclick="updateStatus('reject')">Reject</button>
                    </td>
                </tr>
            `;
        }

        function updateStatus(status) {
            alert("Submission Status updated to: " + status);
            // Yahan Firestore update code aayega: 
            // db.collection('submissions').doc(id).update({ status: status })
        }

        loadSubmissions();
    </script>
</body>
</html>
